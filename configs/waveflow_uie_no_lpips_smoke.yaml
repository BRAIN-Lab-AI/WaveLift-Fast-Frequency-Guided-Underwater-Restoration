# Short smoke test for the no-LPIPS ablation.
# Use this only to verify the pipeline before a full GPU run.

experiment:
  name: waveflow-uie-uieb-no-lpips-smoke
  seed: 42

data:
  train_input: data/UIEB/train/input
  train_target: data/UIEB/train/target
  val_input: data/UIEB/test/input
  val_target: data/UIEB/test/target
  patch_size: 128
  batch_size: 1
  num_workers: 0
  dataset_enlarge_ratio: 1

model:
  velocity_unet:
    in_channels: 28
    out_channels: 12
    base_channels: 32
    channel_mults: [1, 2, 4]
    num_res_blocks: 1
    attention_resolutions: [8]
    dropout: 0.1
    time_emb_dim: 128
    num_groups: 16
  physics_prior:
    in_channels: 3
    hidden_channels: 16
    enabled: true

flow:
  num_inference_steps: 5
  solver: euler

training:
  total_iters: 3
  grad_accum_steps: 1
  fp16: true
  grad_clip: 1.0
  warmup_iters: 5

  optimizer:
    type: AdamW
    lr: 2.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]

  scheduler:
    type: CosineAnnealingLR
    eta_min: 1.0e-6

  ema:
    target_decay: 0.999
    warmup_decay: 0.99
    warmup_iters: 5

  losses:
    cfm_weight: 1.0
    freq_weight: 0.5
    lpips_weight: 0.0
    lab_weight: 0.05
    physics_weight: 0.1
    freq_hf_weight: 2.0

validation:
  val_freq_early: 1000
  val_freq_late: 1000
  val_freq_threshold: 1000
  save_img: false
  metrics: [psnr, ssim, lpips]

logging:
  print_freq: 1
  save_checkpoint_freq: 1000
  sample_freq: 1000
